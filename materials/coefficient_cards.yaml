    notes: "rough order-of-magnitude for somatic mutation per division before amplification"

  - name: dynamics.mutation_rate.dna_kcc2_coupling
    default_value: 4.8
    units: "dimensionless"
    notes: "DNA-adduct * KCC2 (genotoxicity) amplifier on mutation rate"

  - name: dynamics.mutation_rate.ros_coupling
    default_value: 1.2
    units: "dimensionless"
    notes: "ROS amplifier on mutation rate"

  - name: dynamics.mutation_rate.repair_deficit_coupling
    default_value: 2.0
    units: "dimensionless"
    notes: "(1 - repair_capacity) amplifier on mutation rate"

  - name: dynamics.mutation_rate.proliferation_coupling
    default_value: 0.9
    units: "dimensionless"
    notes: "proliferation amplifier on mutation rate"

  # ------------------------------------------------------------------ #
  # qAOP dynamics — driver count proxy                                 #
  # ------------------------------------------------------------------ #

  - name: dynamics.driver_count.intercept
    default_value: 0.35
    units: "dimensionless"
    notes: "baseline driver-acquisition rate at zero proliferation"

  - name: dynamics.driver_count.proliferation_coupling
