    notes: "numerical floor"

  - name: dynamics.clone_fraction.max
    default_value: 0.99
    units: "fraction"
    notes: "numerical ceiling"

  - name: dynamics.clone_fraction.selection_intercept
    default_value: -0.020
    units: "month^-1"
    notes: "baseline negative selection on micro-clones"

  - name: dynamics.clone_fraction.selection_proliferation
    default_value: 0.30
    units: "dimensionless"
    notes: "proliferation -> clonal selection coefficient"

  - name: dynamics.clone_fraction.selection_inflammation
    default_value: 0.070
    units: "dimensionless"
    notes: "inflammation -> clonal selection coefficient"

  - name: dynamics.clone_fraction.selection_epigenetic
    default_value: 0.045
    units: "dimensionless"
    notes: "epigenetic_age -> clonal selection coefficient"

  - name: dynamics.clone_fraction.selection_kcc9
    default_value: 0.18
    units: "dimensionless"
    notes: "KCC9 (immortalization) -> clonal selection coefficient"

  - name: dynamics.clone_fraction.selection_immune
    default_value: 0.22
    units: "dimensionless"
    notes: "immune clearance -> clonal *de*selection coefficient (subtracts)"

  - name: dynamics.clone_fraction.selection_drivers
    default_value: 0.09
    units: "dimensionless"
    notes: "driver_count_proxy -> clonal selection coefficient"

  - name: dynamics.clone_fraction.selection_noise_sigma
    default_value: 0.005
    units: "dimensionless"
    notes: "monthly Gaussian noise on selection coefficient"

  # ------------------------------------------------------------------ #
  # qAOP dynamics — repair-capacity transform                          #
  # ------------------------------------------------------------------ #

  - name: dynamics.repair.kcc3_inhibition
    default_value: 0.35
