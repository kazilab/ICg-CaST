    units: "dimensionless"
    notes: "proliferation amplifier on driver acquisition"

  - name: dynamics.driver_count.kcc9_coupling
    default_value: 0.35
    units: "dimensionless"
    notes: "KCC9 (immortalization) amplifier on driver acquisition"

  # ------------------------------------------------------------------ #
