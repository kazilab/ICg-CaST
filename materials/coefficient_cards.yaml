    default_value: -7.5
    units: "logit"
    notes: "baseline latent_risk logit at zero qAOP state activation"

  - name: dynamics.latent_risk.dna_coupling
    default_value: 1.20
    units: "logit / unit log1p(DNA_adducts)"
    notes: "DNA_adducts -> risk slope (log-scaled)"

  - name: dynamics.latent_risk.ros_coupling
    default_value: 0.70
    units: "logit / unit log1p(ROS)"
    notes: "ROS -> risk slope (log-scaled)"

  - name: dynamics.latent_risk.inflammation_coupling
    default_value: 0.95
    units: "logit / unit log1p(inflammation)"
    notes: "inflammation -> risk slope (log-scaled)"

  - name: dynamics.latent_risk.proliferation_coupling
    default_value: 1.50
    units: "logit"
    notes: "proliferation -> risk slope (linear)"

  - name: dynamics.latent_risk.epigenetic_coupling
    default_value: 0.85
    units: "logit / unit log1p(epigenetic_age)"
    notes: "epigenetic_age -> risk slope (log-scaled)"

  - name: dynamics.latent_risk.driver_coupling
    default_value: 1.80
    units: "logit / unit log1p(driver_count_proxy)"
    notes: "driver count -> risk slope (log-scaled)"

  - name: dynamics.latent_risk.clone_coupling
    default_value: 4.50
    units: "logit / unit clone_fraction"
    notes: "clone fraction -> risk slope (linear)"

  - name: dynamics.latent_risk.immune_coupling
    default_value: 0.90
    units: "logit / unit immune_clearance"
    notes: "immune clearance -> risk slope (linear, *subtracts*)"

  # ------------------------------------------------------------------ #
  # Host susceptibility distributions                                  #
  # ------------------------------------------------------------------ #

  - name: susceptibility.repair_capacity.mean
    default_value: 0.82
    units: "dimensionless"
    notes: "population mean of host repair capacity prior to KCC modulation"

  - name: susceptibility.repair_capacity.sd
    default_value: 0.18
    units: "dimensionless"

  - name: susceptibility.repair_capacity.min
    default_value: 0.35
    units: "dimensionless"

  - name: susceptibility.repair_capacity.max
    default_value: 1.25
    units: "dimensionless"

  - name: susceptibility.antioxidant_capacity.mean
    default_value: 0.85
    units: "dimensionless"

  - name: susceptibility.antioxidant_capacity.sd
    default_value: 0.17
    units: "dimensionless"

  - name: susceptibility.antioxidant_capacity.min
    default_value: 0.35
    units: "dimensionless"

  - name: susceptibility.antioxidant_capacity.max
    default_value: 1.25
    units: "dimensionless"

  - name: susceptibility.immune_surveillance.mean
    default_value: 0.82
    units: "dimensionless"

  - name: susceptibility.immune_surveillance.sd
    default_value: 0.20
    units: "dimensionless"

  - name: susceptibility.immune_surveillance.min
    default_value: 0.25
    units: "dimensionless"

  - name: susceptibility.immune_surveillance.max
