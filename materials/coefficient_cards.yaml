    notes: "period of the cyclical multiplier (annual)"

  - name: dynamics.dose.pulse_lognormal_mean
    default_value: -0.02
    units: "log-units"
    notes: "median of per-month dose pulse multiplier (log-units)"

  - name: dynamics.dose.pulse_lognormal_sigma
    default_value: 0.15
    units: "log-units"
    notes: "spread of per-month dose pulse multiplier"

  # ------------------------------------------------------------------ #
  # latent_risk equation (the reference oracle, see Milestone 11)      #
  # ------------------------------------------------------------------ #

