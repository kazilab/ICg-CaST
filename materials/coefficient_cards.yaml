# ICg-CaST coefficient registry
# PLAN.md reference: section 25 (Coefficient credibility roadmap), Milestones 8-9.
#
# Every numeric coefficient that drives the qAOP dynamics, the latent_risk
# equation, the chemical archetype tables, and the host susceptibility
# distributions lives here. Edit this file rather than the source code.
#
# Coverage status:
#   - simulator.py dynamics + susceptibility + cohort sampling : COVERED
#   - constants.py ARCHETYPE_KCC and ARCHETYPE_SIGNATURE       : COVERED
#   - omics.py module readout weights                          : COVERED
#   - signatures.py toy SBS recipe parameters                  : COVERED
#   - coefficient-card priors for uncertainty sampling          : COVERED
#
# Evidence levels:
#   E1   published quantitative literature value
#   E2   published qualitative direction or magnitude
#   E3   AOP-Wiki / AOP-DB / KER weight-of-evidence
#   E4   expert estimate, plausible biological order of magnitude
#   E5   no source ("hand-tuned to produce interesting cohorts")
#
# Prior distributions:
#   "auto" lets the loader choose fixed/string, lognormal/signed-lognormal,
#   logit-normal, or Dirichlet based on value shape and evidence level.

schema_version: "0.2"

defaults:
  evidence_level: "E5"
  source: "starter kit (PLAN.md sections 6 and 7)"
  last_reviewed: "2026-05-13"
  prior_distribution: "auto"
  prior_params: {}

cards:

  # ------------------------------------------------------------------ #
  # qAOP dynamics — DNA adducts                                        #
  # ------------------------------------------------------------------ #

  - name: dynamics.dna_adducts.decay
    default_value: 0.68
    units: "month^-1"
    notes: "first-order monthly persistence of the DNA-adduct burden between exposures"

  - name: dynamics.dna_adducts.repair_strength
    default_value: 0.36
    units: "dimensionless"
    notes: "repair-driven removal coefficient on repair_capacity * dna_adducts"

  - name: dynamics.dna_adducts.max
    default_value: 20.0
    units: "a.u."
    notes: "hard ceiling on adduct burden to prevent numerical runaway"

  - name: dynamics.dna_adducts.input_kcc1_intercept
    default_value: 0.20
    units: "dimensionless"
    notes: "baseline KCC1 coupling on adduct input when KCC1 = 0"

  - name: dynamics.dna_adducts.input_kcc1_slope
    default_value: 1.35
    units: "dimensionless"
    notes: "slope of internal-dose -> adduct-input scaling with KCC1 activation"

  - name: dynamics.dna_adducts.input_kcc2_intercept
    default_value: 0.25
    units: "dimensionless"
    notes: "baseline KCC2 coupling on adduct input when KCC2 = 0"

  - name: dynamics.dna_adducts.input_kcc2_slope
    default_value: 1.10
    units: "dimensionless"
    notes: "slope of KCC2 (genotoxicity) contribution to adduct input"

  # ------------------------------------------------------------------ #
  # qAOP dynamics — ROS                                                #
  # ------------------------------------------------------------------ #

  - name: dynamics.ros.decay
    default_value: 0.74
    units: "month^-1"
    notes: "monthly persistence of accumulated ROS load"

  - name: dynamics.ros.antioxidant_strength
    default_value: 0.42
    units: "dimensionless"
    notes: "antioxidant-driven ROS clearance coefficient"

  - name: dynamics.ros.max
    default_value: 20.0
    units: "a.u."
    notes: "hard ceiling to prevent runaway"

  - name: dynamics.ros.input_intercept
    default_value: 0.10
    units: "dimensionless"
    notes: "baseline ROS production at zero KCC activation"

  - name: dynamics.ros.input_kcc5_slope
    default_value: 1.45
    units: "dimensionless"
    notes: "ROS production scaling with KCC5 (oxidative-stress activation)"

  - name: dynamics.ros.input_kcc1_slope
    default_value: 0.35
    units: "dimensionless"
    notes: "secondary ROS production through KCC1 (electrophilic activation)"

  # ------------------------------------------------------------------ #
  # qAOP dynamics — cytotoxicity (intermediate sigmoid)                #
  # ------------------------------------------------------------------ #

  - name: dynamics.cytotoxicity.intercept
    default_value: -2.2
    units: "logit"
    notes: "baseline cytotoxicity logit at zero DNA-adduct and ROS load"

  - name: dynamics.cytotoxicity.dna_coupling
    default_value: 0.35
    units: "logit"
    notes: "DNA-adduct -> cytotoxicity slope"

  - name: dynamics.cytotoxicity.ros_coupling
    default_value: 0.25
    units: "logit"
    notes: "ROS -> cytotoxicity slope"

  # ------------------------------------------------------------------ #
  # qAOP dynamics — inflammation                                       #
  # ------------------------------------------------------------------ #

  - name: dynamics.inflammation.decay
    default_value: 0.80
    units: "month^-1"
    notes: "monthly persistence of accumulated inflammation"

  - name: dynamics.inflammation.ros_coupling
    default_value: 0.10
    units: "dimensionless"
    notes: "ROS -> inflammation slope (per unit ROS)"

  - name: dynamics.inflammation.cytotoxicity_coupling
    default_value: 0.35
    units: "dimensionless"
    notes: "cytotoxicity -> inflammation slope"

  - name: dynamics.inflammation.dose_kcc6_coupling
    default_value: 0.95
    units: "dimensionless"
    notes: "internal_dose * KCC6 (chronic inflammation key characteristic) coupling"

  - name: dynamics.inflammation.immune_clearance
    default_value: 0.24
    units: "month^-1"
    notes: "immune-driven resolution of inflammation"

  - name: dynamics.inflammation.max
    default_value: 20.0
    units: "a.u."
    notes: "hard ceiling to prevent runaway"

  # ------------------------------------------------------------------ #
  # qAOP dynamics — epigenetic age                                     #
  # ------------------------------------------------------------------ #

  - name: dynamics.epigenetic_age.background_rate
    default_value: 0.011
    units: "a.u. / month"
    notes: "background epigenetic-age accrual independent of exposure"

  - name: dynamics.epigenetic_age.dose_kcc4_coupling
    default_value: 0.055
    units: "dimensionless"
    notes: "internal_dose * KCC4 (epigenetic alteration) coupling"

  - name: dynamics.epigenetic_age.dose_kcc5_coupling
    default_value: 0.018
    units: "dimensionless"
    notes: "internal_dose * KCC5 (oxidative stress) coupling"

  - name: dynamics.epigenetic_age.dose_kcc6_coupling
    default_value: 0.018
    units: "dimensionless"
    notes: "internal_dose * KCC6 (chronic inflammation) coupling"

  - name: dynamics.epigenetic_age.ros_coupling
    default_value: 0.003
    units: "1/(unit ROS)"
    notes: "ROS -> epigenetic-age accrual"

  - name: dynamics.epigenetic_age.max
    default_value: 50.0
    units: "a.u."
    notes: "hard ceiling to prevent runaway"

  # ------------------------------------------------------------------ #
  # qAOP dynamics — proliferation (sigmoid)                            #
  # ------------------------------------------------------------------ #

  - name: dynamics.proliferation.intercept
