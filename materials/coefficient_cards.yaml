    default_value: 0.6
  - name: omics.transcript.base_excision_repair.kcc3_coeff
    default_value: -0.8
    notes: "KCC3 (DNA repair / genomic instability) suppresses BER expression"
  - name: omics.transcript.base_excision_repair.susceptibility_repair_coeff
    default_value: 0.3

  # nucleotide_excision_repair
