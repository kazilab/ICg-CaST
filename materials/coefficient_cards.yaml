    evidence_level: "E4"
    notes: "aristolochic-acid-like mechanism vector"

  - name: archetypes.aristolochic_like.signature
    default_value: "SBS22_like"
    notes: "synthetic approximation of COSMIC SBS22"

  - name: archetypes.cyp2e1_ros_like.kcc
