  # ================================================================== #
  # Transcriptomic module readouts (omics.py)                          #
  # ------------------------------------------------------------------ #
  # Each module is a linear combination of qAOP state AUCs + KCC vector#
  # + host susceptibility components, with Gaussian noise applied at   #
  # the end. Coefficient names follow the pattern                      #
  #   omics.transcript.<module>.<input>_coeff                          #
  # where <input> is one of:                                           #
  #   dna, ros, inflammation, epi_age, proliferation, clone, drivers   #
  #   kcc1 .. kcc10                                                    #
  #   susceptibility_repair, susceptibility_immune                     #
  # ------------------------------------------------------------------ #

  # DNA_adduct_response
  - name: omics.transcript.DNA_adduct_response.dna_coeff
    default_value: 0.8
    units: "dimensionless"
  - name: omics.transcript.DNA_adduct_response.kcc1_coeff
    default_value: 1.2
    units: "dimensionless"
  - name: omics.transcript.DNA_adduct_response.kcc2_coeff
    default_value: 1.0
    units: "dimensionless"

  # p53_checkpoint
  - name: omics.transcript.p53_checkpoint.dna_coeff
    default_value: 0.6
  - name: omics.transcript.p53_checkpoint.ros_coeff
    default_value: 0.7
  - name: omics.transcript.p53_checkpoint.kcc2_coeff
    default_value: 0.8

