  - name: dynamics.proliferation.inflammation_coupling
    default_value: 0.27
    units: "logit"
    notes: "inflammation -> proliferation slope"

  - name: dynamics.proliferation.cytotoxicity_coupling
    default_value: 0.20
    units: "logit"
    notes: "cytotoxicity -> proliferation slope (compensatory)"

  - name: dynamics.proliferation.dose_kcc8_coupling
    default_value: 1.15
    units: "logit"
    notes: "internal_dose * KCC8 (receptor-mediated) coupling"

  - name: dynamics.proliferation.kcc10_coupling
    default_value: 0.90
    units: "logit"
    notes: "KCC10 (proliferation / death / nutrient supply) slope"

  - name: dynamics.proliferation.epigenetic_coupling
    default_value: 0.16
    units: "logit"
    notes: "epigenetic_age -> proliferation slope"

  # ------------------------------------------------------------------ #
  # qAOP dynamics — mutation rate                                      #
  # ------------------------------------------------------------------ #

  - name: dynamics.mutation_rate.scale
    default_value: 0.0012
    units: "mutations per Mb per division (synthetic scale)"
