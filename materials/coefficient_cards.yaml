  - name: archetypes.metal_epigenetic_like.signature
    default_value: "oxidative_like"

  - name: archetypes.endocrine_receptor_like.kcc
    default_value: [0.08, 0.05, 0.15, 0.55, 0.20, 0.30, 0.10, 0.92, 0.20, 0.82]
    units: "10-vector of KCC activations in [0, 1]"
    evidence_level: "E4"
    notes: "receptor-mediated endocrine mechanism vector (low genotoxicity, high proliferative)"

  - name: archetypes.endocrine_receptor_like.signature
    default_value: "aging"
    notes: "no characteristic SBS signature; baseline aging dominates"

  - name: archetypes.immune_suppression_like.kcc
    default_value: [0.05, 0.08, 0.15, 0.30, 0.25, 0.65, 0.90, 0.20, 0.55, 0.35]
    units: "10-vector of KCC activations in [0, 1]"
    evidence_level: "E4"
    notes: "immunosuppression-dominant mechanism vector"

  - name: archetypes.immune_suppression_like.signature
