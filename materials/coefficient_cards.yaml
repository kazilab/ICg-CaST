    default_value: 0.9
  - name: omics.transcript.NFkB_activation.ros_coeff
    default_value: 0.5
  - name: omics.transcript.NFkB_activation.kcc6_coeff
    default_value: 0.6

  # cell_cycle_E2F
  - name: omics.transcript.cell_cycle_E2F.proliferation_coeff
    default_value: 1.8
  - name: omics.transcript.cell_cycle_E2F.kcc10_coeff
    default_value: 0.7
  - name: omics.transcript.cell_cycle_E2F.clone_coeff
    default_value: 0.2

  # replicative_DNA_synthesis
  - name: omics.transcript.replicative_DNA_synthesis.proliferation_coeff
    default_value: 1.5
  - name: omics.transcript.replicative_DNA_synthesis.kcc8_coeff
    default_value: 0.5
  - name: omics.transcript.replicative_DNA_synthesis.kcc10_coeff
    default_value: 0.7

  # apoptosis_escape
  - name: omics.transcript.apoptosis_escape.kcc9_coeff
    default_value: 0.7
  - name: omics.transcript.apoptosis_escape.clone_coeff
    default_value: 0.8
  - name: omics.transcript.apoptosis_escape.inflammation_coeff
    default_value: 0.3

  # ECM_fibrosis
  - name: omics.transcript.ECM_fibrosis.inflammation_coeff
    default_value: 0.9
  - name: omics.transcript.ECM_fibrosis.epi_age_coeff
    default_value: 0.8
  - name: omics.transcript.ECM_fibrosis.kcc4_coeff
    default_value: 0.4

  # angiogenesis_nutrient_supply
  - name: omics.transcript.angiogenesis_nutrient_supply.proliferation_coeff
    default_value: 0.6
  - name: omics.transcript.angiogenesis_nutrient_supply.inflammation_coeff
    default_value: 0.7
  - name: omics.transcript.angiogenesis_nutrient_supply.kcc10_coeff
    default_value: 0.5

  # immune_evasion
  - name: omics.transcript.immune_evasion.kcc7_coeff
    default_value: 0.9
  - name: omics.transcript.immune_evasion.clone_coeff
    default_value: 0.7
  - name: omics.transcript.immune_evasion.susceptibility_immune_coeff
    default_value: -0.5
    notes: "host immune surveillance subtracts from observed immune-evasion signal"

  # nuclear_receptor_program
  - name: omics.transcript.nuclear_receptor_program.kcc8_coeff
    default_value: 1.6
  - name: omics.transcript.nuclear_receptor_program.proliferation_coeff
    default_value: 0.5

  # stemness_PRC2
  - name: omics.transcript.stemness_PRC2.epi_age_coeff
    default_value: 0.9
  - name: omics.transcript.stemness_PRC2.kcc4_coeff
    default_value: 0.6
  - name: omics.transcript.stemness_PRC2.drivers_coeff
    default_value: 0.3

  # senescence_SASP
  - name: omics.transcript.senescence_SASP.ros_coeff
    default_value: 0.4
  - name: omics.transcript.senescence_SASP.inflammation_coeff
    default_value: 0.9
  - name: omics.transcript.senescence_SASP.epi_age_coeff
    default_value: 0.4

  # Transcriptomic measurement noise.
  - name: omics.transcript.noise_sigma
    default_value: 0.25
    units: "module units"
    notes: "Gaussian additive noise applied to each transcript module value"

  # ================================================================== #
  # Epigenomic module readouts (omics.py)                              #
  # ------------------------------------------------------------------ #
  # PRC2_mitotic_clock is reformulated as a linear combination of      #
  # epi_age, (epi_age * proliferation), and drivers so every epi card  #
  # is one linear coefficient.                                         #
  # ------------------------------------------------------------------ #

  # epigenetic_age_acceleration
  - name: omics.epi.epigenetic_age_acceleration.epi_age_coeff
    default_value: 1.0
    notes: "previously implicit (1.0) coefficient on epi_age"
  - name: omics.epi.epigenetic_age_acceleration.kcc4_coeff
    default_value: 0.5
  - name: omics.epi.epigenetic_age_acceleration.ros_coeff
    default_value: 0.2

  # PRC2_mitotic_clock = epi_age * (a + b * proliferation) + c * drivers
  - name: omics.epi.PRC2_mitotic_clock.epi_age_coeff
    default_value: 0.75
    notes: "constant a; the (1 - proliferation) part of the epi_age multiplier"
  - name: omics.epi.PRC2_mitotic_clock.epi_age_times_proliferation_coeff
    default_value: 0.8
    notes: "coefficient on epi_age * proliferation interaction"
  - name: omics.epi.PRC2_mitotic_clock.drivers_coeff
    default_value: 0.3

  # global_hypomethylation
  - name: omics.epi.global_hypomethylation.epi_age_coeff
    default_value: 0.5
  - name: omics.epi.global_hypomethylation.kcc4_coeff
    default_value: 0.7
  - name: omics.epi.global_hypomethylation.ros_coeff
    default_value: 0.25

  # tumor_suppressor_hypermethylation
  - name: omics.epi.tumor_suppressor_hypermethylation.epi_age_coeff
    default_value: 0.6
  - name: omics.epi.tumor_suppressor_hypermethylation.kcc4_coeff
    default_value: 0.6
  - name: omics.epi.tumor_suppressor_hypermethylation.clone_coeff
    default_value: 0.35

  # enhancer_reprogramming
  - name: omics.epi.enhancer_reprogramming.kcc4_coeff
    default_value: 0.6
  - name: omics.epi.enhancer_reprogramming.kcc8_coeff
    default_value: 0.4
  - name: omics.epi.enhancer_reprogramming.inflammation_coeff
    default_value: 0.25

  # histone_activation_loss
  - name: omics.epi.histone_activation_loss.kcc4_coeff
    default_value: 0.8
  - name: omics.epi.histone_activation_loss.epi_age_coeff
    default_value: 0.4

  # histone_repression_gain
  - name: omics.epi.histone_repression_gain.kcc4_coeff
    default_value: 0.9
  - name: omics.epi.histone_repression_gain.epi_age_coeff
    default_value: 0.3
  - name: omics.epi.histone_repression_gain.drivers_coeff
    default_value: 0.25

  # chromatin_accessibility_shift
  - name: omics.epi.chromatin_accessibility_shift.kcc4_coeff
    default_value: 0.4
  - name: omics.epi.chromatin_accessibility_shift.ros_coeff
    default_value: 0.3
  - name: omics.epi.chromatin_accessibility_shift.kcc8_coeff
    default_value: 0.3

  # Epigenomic measurement noise.
  - name: omics.epi.noise_sigma
    default_value: 0.18
    units: "module units"
    notes: "Gaussian additive noise applied to each epi module value"

  # ================================================================== #
  # Mutational-signature mixing + total-mutation count                 #
  # ------------------------------------------------------------------ #

  - name: omics.signature_mix.aging_base_weight
    default_value: 0.45
    units: "weight"
    notes: "weight on the 'aging' baseline signature before primary-signature blending"

  - name: omics.signature_mix.primary_weight_intercept
    default_value: 0.1
    units: "weight"
  - name: omics.signature_mix.primary_weight_kcc2_coeff
    default_value: 0.40
    units: "weight"
  - name: omics.signature_mix.primary_weight_dna_coeff
    default_value: 0.12
    units: "weight"
  - name: omics.signature_mix.primary_weight_ros_coeff
    default_value: 0.06
    units: "weight"
  - name: omics.signature_mix.primary_weight_min
    default_value: 0.05
    units: "weight"
  - name: omics.signature_mix.primary_weight_max
    default_value: 0.85
    units: "weight"

  - name: omics.signature_mix.oxidative_kcc5_threshold
    default_value: 0.5
    units: "KCC5 activation"
    notes: "subjects with KCC5 (oxidative stress) above this get an oxidative_like blend"
  - name: omics.signature_mix.oxidative_base_weight
    default_value: 0.80
    units: "weight"
    notes: "weight on the prior mix when the oxidative blend triggers"
  - name: omics.signature_mix.oxidative_blend_weight
    default_value: 0.20
    units: "weight"

  - name: omics.mut_total.intercept
    default_value: 80.0
    units: "mutation count"
    notes: "baseline expected mutation count per subject (Poisson lambda intercept)"
  - name: omics.mut_total.mutation_rate_coeff
    default_value: 350.0
    units: "mutation count per unit AUC"
  - name: omics.mut_total.drivers_coeff
    default_value: 40.0
    units: "mutation count per unit drivers"
  - name: omics.mut_total.dna_coeff
    default_value: 35.0
    units: "mutation count per unit DNA-adduct AUC"
  - name: omics.mut_total.ros_coeff
    default_value: 15.0
    units: "mutation count per unit ROS AUC"
  - name: omics.mut_total.min_count
    default_value: 10
    units: "mutation count"
    notes: "lower clip on the Poisson draw"

  # ================================================================== #
  # Mutational-signature recipe (signatures.py)                        #
  # ------------------------------------------------------------------ #

  - name: signatures.background.seed
    default_value: 123
    units: "RNG seed"
    notes: "seed for the gamma background drawn once at module import"
  - name: signatures.background.gamma_shape
    default_value: 1.0
    units: "gamma shape"
  - name: signatures.background.gamma_scale
    default_value: 0.2
    units: "gamma scale"
  - name: signatures.background.min_clip
    default_value: 1.0e-9
    units: "weight"
    notes: "lower clip on signature weights before per-column normalisation"

  - name: signatures.aging.C_to_T_boost
    default_value: 1.0
    units: "weight"
    notes: "boost on every C>T trinucleotide context"
  - name: signatures.aging.CpG_boost
    default_value: 2.0
    units: "weight"
    notes: "extra boost on C>T at CpG sites (any A/C/G/T 5' base, G 3' base)"

  - name: signatures.SBS4_like.C_to_A_boost
    default_value: 2.8
    units: "weight"
    notes: "boost on every C>A context (PAH-like fingerprint)"
  - name: signatures.SBS4_like.AT_ending_extra_boost
    default_value: 0.8
    units: "weight"
    notes: "extra boost on C>A contexts ending in A or T"

  - name: signatures.SBS24_like.C_to_A_boost
    default_value: 1.4
    units: "weight"
    notes: "moderate C>A boost; aflatoxin-like"
  - name: signatures.SBS24_like.context_pattern_boost
    default_value: 3.0
    units: "weight"
    notes: "extra boost on C>A contexts with G/T 5' base and G/C 3' base"

  - name: signatures.SBS22_like.T_to_A_boost
    default_value: 3.2
    units: "weight"
    notes: "boost on every T>A context (aristolochic-acid-like fingerprint)"
  - name: signatures.SBS22_like.CT_leading_extra_boost
    default_value: 1.0
    units: "weight"
    notes: "extra boost on T>A contexts with C or T 5' base"

  - name: signatures.oxidative_like.C_to_AorG_boost
    default_value: 1.5
    units: "weight"
    notes: "boost on C>A and C>G contexts (ROS-driven fingerprint)"
  - name: signatures.oxidative_like.T_to_G_boost
    default_value: 0.6
    units: "weight"
    notes: "secondary boost on T>G contexts"
