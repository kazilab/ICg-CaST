    notes: "median initial clone fraction (before lognormal noise)"

  - name: dynamics.clone_fraction.init_lognormal_sigma
    default_value: 0.35
    units: "dimensionless"
    notes: "lognormal sigma for the initial clone-fraction draw"

  - name: dynamics.clone_fraction.min
    default_value: 1.0e-8
